<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Showdown</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: #1e1e24; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }
        h1, h2, h3 { margin: 10px 0; text-align: center; }
        .screen { display: none; width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }
        
        /* UI Elements */
        input[type="text"] { padding: 10px; margin: 5px; border-radius: 5px; border: none; font-size: 16px; text-align: center;}
        button { padding: 12px 20px; margin: 5px; font-size: 16px; background: #4a4e69; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #22223b; }
        button:disabled { background: #555; cursor: not-allowed; }
        .menu-box { background: #2b2d42; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; width: 100%; max-width: 400px;}
        
        /* Game Area */
        #game-layout { display: flex; flex-wrap: wrap; width: 100%; justify-content: center; gap: 20px; position: relative; }
        #main-player { display: flex; flex-direction: column; align-items: center; }
        .board-container { display: flex; gap: 15px; align-items: flex-start;}
        canvas { background-color: #000; border: 2px solid #8d99ae; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        #tetris { height: 60vh; }
        #next-piece { width: 80px; height: 80px; }
        
        /* Opponents */
        #opponents-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; }
        .opponent { display: flex; flex-direction: column; align-items: center; background: #2b2d42; padding: 10px; border-radius: 8px; }
        .opponent canvas { height: 200px; border: 1px solid #555; }
        .opponent-name { font-size: 14px; margin-bottom: 5px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; width: 100px; text-align: center; }
        .target-btn { font-size: 12px; padding: 5px 10px; margin-top: 5px; background: #c1121f; }
        .target-btn.selected { background: #780000; border: 2px solid #fdf0d5; font-weight: bold; }
        
        /* Controls */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; width: 90%; max-width: 300px; }
        .controls button { padding: 15px; font-size: 20px; touch-action: manipulation; }
        .attack-btn { background: #e63946 !important; font-weight: bold; }
        .attack-btn:active { background: #a8202a !important; }
        
        /* Info */
        .stats { display: flex; flex-direction: column; gap: 10px; font-size: 16px; background: #2b2d42; padding: 15px; border-radius: 8px;}
        .trophy { color: gold; font-weight: bold; }
        .charge-text { color: #0DFF72; font-weight: bold; }
        
        /* Overlays */
        #room-id-display { font-size: 24px; font-weight: bold; color: #e63946; user-select: all; margin: 10px 0;}
        #qr-code { background: white; padding: 10px; border-radius: 8px; margin: 10px auto; display: none; }
        .player-list { list-style: none; padding: 0; width: 100%; max-width: 300px;}
        .player-list li { background: #4a4e69; margin: 5px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between;}
        
        /* Tutorial Box */
        #tutorial-box { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #2a9d8f; padding: 20px; border-radius: 8px; z-index: 100; text-align: center; border: 3px solid #fff; width: 90%; max-width: 400px; box-shadow: 0 0 15px rgba(0,0,0,0.8);}
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1>Tetris Showdown</h1>
        <div class="menu-box">
            <h3>Player Info</h3>
            <input type="text" id="player-name" placeholder="Enter your Name" maxlength="12">
            <div style="margin-top: 10px;"><span class="trophy">🏆 Trophies: <span id="menu-trophies">0</span></span></div>
        </div>

        <div class="menu-box">
            <h3>Game Modes</h3>
            <button onclick="startSoloGame()" style="background: #e63946;">Play Solo</button>
            <button onclick="startTutorial()" style="background: #2a9d8f;">How to Play (Tutorial)</button>
        </div>

        <div class="menu-box">
            <h3>Music Selection (Host Stream)</h3>
            <label>Upload File (Required for custom music)</label>
            <input type="file" id="audio-file" accept="audio/*" style="margin-top:10px;">
        </div>

        <div class="menu-box">
            <h3>Multiplayer PvP</h3>
            <button id="btn-create" onclick="createRoom()">Create Room (Host)</button>
            <hr style="border: 1px solid #444; margin: 15px 0;">
            <input type="text" id="room-id-input" placeholder="Enter Room ID">
            <button id="btn-join" onclick="joinRoom()">Join Room</button>
            <p id="menu-status"></p>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>Waiting Lobby</h2>
        <p>Room ID (Share this):</p>
        <div id="room-id-display">Connecting...</div>
        <div id="qr-code"></div>
        
        <h3>Players (<span id="player-count">1</span>/10)</h3>
        <ul class="player-list" id="lobby-players"></ul>
        
        <button id="btn-start" onclick="startGame()" style="display:none; background: #2a9d8f;">Start Game</button>
        <button onclick="leaveRoom()">Leave</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-layout">
            
            <div id="tutorial-box">
                <h3 id="tut-title" style="margin-top:0;">Tutorial Step</h3>
                <p id="tut-msg"></p>
                <button id="tut-btn" onclick="advanceTutorial()">Next</button>
            </div>

            <div id="main-player">
                <div class="board-container">
                    <canvas id="tetris" width="240" height="400"></canvas>
                    <div class="stats">
                        <div>Next:</div>
                        <canvas id="next-piece" width="80" height="80"></canvas>
                        <div>Score: <span id="score">0</span></div>
                        <div class="charge-text">Charge: <span id="charge">0</span></div>
                        <div>Target: <span id="current-target-name" style="color:#e63946">None</span></div>
                    </div>
                </div>
                
                <div class="controls">
                    <button onclick="playerRotate(-1)">↺</button>
                    <button class="rotate" onclick="playerRotate(1)">↻</button>
                    <button class="attack-btn" onclick="triggerAttack()">⚔️</button>
                    
                    <button onclick="playerMove(-1)">←</button>
                    <button onclick="playerHardDrop()">⬇️</button>
                    <button onclick="playerMove(1)">→</button>
                </div>
            </div>
            
            <div id="opponents-container">
                </div>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <h1 id="end-title">Game Over</h1>
        <h3 id="end-subtitle"></h3>
        <div class="menu-box">
            <button id="btn-continue" onclick="continueToLobby()" style="display:none;">Continue</button>
            <button onclick="leaveRoom()">Exit to Menu</button>
        </div>
    </div>

    <script>
        // --- GLOBAL VARIABLES ---
        let peer = null;
        let connections = {}; 
        let hostConn = null;  
        let isHost = false;
        let isSolo = false;
        let isTutorial = false;
        let tutorialStep = 0;
        let myId = '';
        let myName = '';
        let myTrophies = parseInt(localStorage.getItem('tetrisTrophies')) || 0;
        
        let playersData = {}; 
        let targetId = null;
        let gameState = 'MENU'; 

        // Mechanics
        let attackCharge = 0;
        let nextPieceMatrix = null;

        // Audio & Streaming
        let customAudio = null;
        let remoteAudioNode = null;
        let myAudioStream = null;

        // --- DOM ELEMENTS ---
        const screens = {
            menu: document.getElementById('screen-menu'),
            lobby: document.getElementById('screen-lobby'),
            game: document.getElementById('screen-game'),
            end: document.getElementById('screen-end')
        };
        const statusTxt = document.getElementById('menu-status');
        const opponentsContainer = document.getElementById('opponents-container');
        document.getElementById('menu-trophies').innerText = myTrophies;

        // --- TETRIS LOGIC ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');
        nextCtx.scale(20, 20);

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF', '#555555']; 
        let arena = createMatrix(12, 20);
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let animationId = null;

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createRandomPiece() {
            const pieces = 'ILJOTSZ';
            return pieces[pieces.length * Math.random() | 0];
        }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
            
            for (let id in playersData) {
                if (id !== myId) drawOpponent(id);
            }
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPieceMatrix) return;
            
            const offsetX = nextPieceMatrix[0].length === 4 ? 0 : (nextPieceMatrix[0].length === 2 ? 1 : 0.5);
            const offsetY = nextPieceMatrix.length === 2 ? 1 : 0.5;
            drawMatrix(nextPieceMatrix, {x: offsetX, y: offsetY}, nextCtx);
        }

        function drawMatrix(matrix, offset, ctx, scale = 1) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
            broadcastBoard();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function playerReset() {
            if (!nextPieceMatrix) nextPieceMatrix = createPiece(createRandomPiece());
            player.matrix = nextPieceMatrix;
            nextPieceMatrix = createPiece(createRandomPiece());
            drawNextPiece();

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                
                if (isSolo || isTutorial) {
                    showEndScreen(false);
                } else {
                    playersData[myId].alive = false;
                    sendNetworkMessage({ type: 'DIED', id: myId });
                    showEndScreen(false); 
                    if (isHost) checkWinCondition();
                }
            }
            broadcastBoard();
        }

        function arenaSweep() {
            let rowCount = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0 || arena[y][x] === 8) continue outer; 
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                rowCount++;
            }
            if (rowCount > 0) {
                player.score += [0, 10, 30, 50, 80][rowCount] || 100;
                attackCharge += rowCount;
                document.getElementById('score').innerText = player.score;
                document.getElementById('charge').innerText = attackCharge;
            }
        }

        function triggerAttack() {
            if(gameState !== 'PLAYING') return;
            
            if (isTutorial && tutorialStep === 8) advanceTutorial();

            if (attackCharge > 0 && targetId && playersData[targetId] && playersData[targetId].alive) {
                sendNetworkMessage({ 
                    type: 'GARBAGE', 
                    target: targetId, 
                    lines: attackCharge 
                });
                attackCharge = 0;
                document.getElementById('charge').innerText = attackCharge;
            }
        }

        function receiveGarbage(lines) {
            if(gameState !== 'PLAYING' || (playersData[myId] && !playersData[myId].alive)) return;
            for (let i = 0; i < lines; i++) {
                arena.shift(); 
                let newRow = new Array(12).fill(8); 
                newRow[Math.floor(Math.random() * 12)] = 0; 
                arena.push(newRow);
            }
            broadcastBoard();
        }

        function playerDrop() {
            if(gameState !== 'PLAYING') return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if(gameState !== 'PLAYING') return;
            
            if (isTutorial && tutorialStep === 4) advanceTutorial();

            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }

        function playerMove(dir) {
            if(gameState !== 'PLAYING') return;
            
            if (isTutorial && tutorialStep === 2) advanceTutorial();

            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            if(gameState !== 'PLAYING') return;
            
            if (isTutorial && tutorialStep === 3) advanceTutorial();

            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function update(time = 0) {
            if (gameState !== 'PLAYING') return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            animationId = requestAnimationFrame(update);
        }

        // --- MULTIPLAYER & SOLO LOGIC ---

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function initPlayerInfo() {
            myName = document.getElementById('player-name').value.trim() || 'Player_' + Math.floor(Math.random()*1000);
            playersData = {};
            targetId = null;
        }

        function setupAudioCalls() {
            if(!peer) return;
            peer.on('call', call => {
                call.answer(); 
                call.on('stream', remoteStream => {
                    if (remoteAudioNode) {
                        remoteAudioNode.pause();
                        remoteAudioNode.srcObject = null;
                    }
                    remoteAudioNode = new Audio();
                    remoteAudioNode.srcObject = remoteStream;
                    remoteAudioNode.play().catch(e => console.log("Stream play error:", e));
                });
            });
        }

        function createRoom() {
            initPlayerInfo();
            isSolo = false;
            isTutorial = false;
            statusTxt.innerText = "Creating room...";
            document.getElementById('btn-create').disabled = true;
            
            peer = new Peer();
            peer.on('open', (id) => {
                isHost = true;
                myId = id;
                document.getElementById('room-id-display').innerText = id;
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('btn-continue').style.display = 'inline-block';
                document.getElementById('btn-continue').innerText = 'Continue (Host)';
                document.getElementById('btn-continue').onclick = continueToLobby;
                
                const qrContainer = document.getElementById('qr-code');
                qrContainer.innerHTML = '';
                qrContainer.style.display = 'inline-block';
                new QRCode(qrContainer, {
                    text: id,
                    width: 128,
                    height: 128,
                    colorDark : "#e63946",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });

                setupAudioCalls();
                addPlayerToLobby(myId, myName, myTrophies);
                switchScreen('lobby');
            });

            peer.on('connection', (conn) => {
                if(Object.keys(connections).length >= 9) {
                    conn.send({type: 'ERROR', msg: 'Room full'});
                    setTimeout(() => conn.close(), 500);
                    return;
                }
                if (gameState === 'PLAYING') {
                    conn.send({type: 'ERROR', msg: 'Game already in progress'});
                    setTimeout(() => conn.close(), 500);
                    return;
                }
                connections[conn.peer] = conn;
                conn.on('data', (data) => handleNetworkData(data, conn.peer));
                conn.on('close', () => { delete connections[conn.peer]; removePlayer(conn.peer); });
            });
        }

        function joinRoom() {
            const roomId = document.getElementById('room-id-input').value.trim();
            if (!roomId) return alert("Enter a Room ID");
            initPlayerInfo();
            isSolo = false;
            isTutorial = false;
            statusTxt.innerText = "Connecting...";
            document.getElementById('btn-join').disabled = true;

            peer = new Peer();
            peer.on('open', (id) => {
                isHost = false;
                myId = id;
                setupAudioCalls();
                hostConn = peer.connect(roomId);
                
                hostConn.on('open', () => {
                    document.getElementById('room-id-display').innerText = roomId;
                    document.getElementById('qr-code').style.display = 'none';
                    document.getElementById('btn-start').style.display = 'none';
                    document.getElementById('btn-continue').style.display = 'none';
                    switchScreen('lobby');
                    hostConn.send({ type: 'JOIN', id: myId, name: myName, trophies: myTrophies });
                });

                hostConn.on('data', (data) => handleNetworkData(data, roomId));
                hostConn.on('close', () => { alert("Host disconnected"); leaveRoom(); });
            });
        }

        function startSoloGame() {
            initPlayerInfo();
            isHost = true;
            isSolo = true;
            isTutorial = false;
            myId = 'solo';
            
            document.getElementById('btn-continue').innerText = 'Play Again (Solo)';
            document.getElementById('btn-continue').onclick = startSoloGame;

            playersData[myId] = { name: myName, trophies: myTrophies, alive: true, board: createMatrix(12, 20) };
            
            startLocalGame();
        }

        // --- TUTORIAL LOGIC ---
        function startTutorial() {
            initPlayerInfo();
            isHost = true;
            isSolo = true;
            isTutorial = true;
            myId = 'solo';
            tutorialStep = 1;
            
            playersData[myId] = { name: myName, trophies: myTrophies, alive: true, board: createMatrix(12, 20) };
            
            document.getElementById('tutorial-box').style.display = 'block';
            startLocalGame();
            
            // Slow down drops to practically pause it unless player hard drops
            dropInterval = 999999;
            updateTutorialUI();
        }

        function advanceTutorial() {
            if (!isTutorial) return;
            tutorialStep++;
            updateTutorialUI();
        }

        function updateTutorialUI() {
            const title = document.getElementById('tut-title');
            const msg = document.getElementById('tut-msg');
            const btn = document.getElementById('tut-btn');
            
            title.innerText = `Step ${tutorialStep}/10`;
            btn.style.display = 'inline-block';
            btn.innerText = 'Next';

            switch(tutorialStep) {
                case 1:
                    msg.innerText = "Welcome to Tetris Showdown! Let's learn the basics.";
                    break;
                case 2:
                    msg.innerText = "Use the Left (←) or Right (→) buttons below to move your piece.";
                    btn.style.display = 'none'; // Wait for user action
                    break;
                case 3:
                    msg.innerText = "Great! Now press the Rotate buttons (↺ or ↻) to rotate the piece.";
                    btn.style.display = 'none';
                    break;
                case 4:
                    msg.innerText = "Awesome. Now press the Down arrow (⬇️) to Hard Drop the piece to the floor instantly.";
                    btn.style.display = 'none';
                    break;
                case 5:
                    msg.innerText = "Look at the 'Next' box above your score to plan your moves ahead of time!";
                    break;
                case 6:
                    msg.innerText = "Clearing lines gives you Attack Charge. I've given you some Charge now!";
                    attackCharge = 5;
                    document.getElementById('charge').innerText = attackCharge;
                    break;
                case 7:
                    msg.innerText = "In Multiplayer, you can target opponents. Click the 'Target' button under the dummy opponent.";
                    btn.style.display = 'none';
                    // Inject mock opponent
                    playersData['dummy'] = { name: "Dummy Player", trophies: 0, alive: true, board: createMatrix(12, 20) };
                    setupOpponentViews();
                    break;
                case 8:
                    msg.innerText = "Now click the Red Swords (⚔️) button to attack and send your Charge as garbage lines!";
                    btn.style.display = 'none';
                    break;
                case 9:
                    msg.innerText = "Garbage lines push blocks up. If your blocks touch the top of the board, you lose!";
                    break;
                case 10:
                    msg.innerText = "You're ready! Be the last one standing in PvP or get a high score in Solo. Good luck!";
                    btn.innerText = 'Finish';
                    btn.onclick = () => {
                        document.getElementById('tutorial-box').style.display = 'none';
                        leaveRoom();
                    };
                    break;
            }
        }


        function addPlayerToLobby(id, name, trophies) {
            playersData[id] = { name, trophies, alive: true, board: createMatrix(12, 20) };
            updateLobbyUI();
            if (isHost && !isSolo) broadcastLobbyState();
        }

        function removePlayer(id) {
            delete playersData[id];
            updateLobbyUI();
            if(gameState === 'PLAYING') {
                if(!isSolo) checkWinCondition();
                setupOpponentViews(); 
            }
            if (isHost && !isSolo) broadcastLobbyState();
        }

        function updateLobbyUI() {
            const list = document.getElementById('lobby-players');
            list.innerHTML = '';
            let count = 0;
            for (let id in playersData) {
                count++;
                let li = document.createElement('li');
                li.innerHTML = `<span>${playersData[id].name} ${id===myId?'(You)':''}</span> <span>🏆 ${playersData[id].trophies}</span>`;
                list.appendChild(li);
            }
            document.getElementById('player-count').innerText = count;
            if (isHost && !isSolo) {
                document.getElementById('btn-start').disabled = count < 2; 
            }
        }

        function sendNetworkMessage(msg) {
            if (isSolo || isTutorial) return; // Ignore networking in Solo/Tutorial
            if (isHost) {
                if (msg.type === 'GARBAGE') {
                    if (msg.target === myId) receiveGarbage(msg.lines);
                    else if (connections[msg.target]) connections[msg.target].send(msg);
                } else {
                    for (let id in connections) connections[id].send(msg);
                }
            } else if (hostConn) {
                hostConn.send(msg); 
            }
        }

        function handleNetworkData(data, senderId) {
            switch(data.type) {
                case 'JOIN':
                    if (isHost) addPlayerToLobby(data.id, data.name, data.trophies);
                    break;
                case 'LOBBY_STATE':
                    playersData = data.players;
                    updateLobbyUI();
                    break;
                case 'START':
                    startLocalGame();
                    break;
                case 'BOARD':
                    if (playersData[data.id]) playersData[data.id].board = data.matrix;
                    if (isHost) broadcastBoard(data.id, data.matrix); 
                    break;
                case 'GARBAGE':
                    if (isHost) {
                        if (data.target === myId) receiveGarbage(data.lines);
                        else if (connections[data.target]) connections[data.target].send(data);
                    } else if (data.target === myId) {
                        receiveGarbage(data.lines);
                    }
                    break;
                case 'DIED':
                    if (playersData[data.id]) playersData[data.id].alive = false;
                    if (isHost) {
                        sendNetworkMessage(data); 
                        checkWinCondition();
                    }
                    autoSwitchTarget();
                    break;
                case 'GAME_OVER':
                    showEndScreen(data.winnerId === myId, data.winnerName);
                    break;
                case 'CONTINUE':
                    switchScreen('lobby');
                    gameState = 'LOBBY';
                    break;
                case 'ERROR':
                    alert(data.msg);
                    leaveRoom();
                    break;
            }
        }

        function broadcastLobbyState() {
            if (!isSolo) sendNetworkMessage({ type: 'LOBBY_STATE', players: playersData });
        }

        function broadcastBoard(id = myId, matrix = arena) {
            if (!isSolo) sendNetworkMessage({ type: 'BOARD', id, matrix });
        }

        // --- GAME FLOW ---

        function startGame() {
            if (!isHost || isSolo) return;
            sendNetworkMessage({ type: 'START' });
            startLocalGame();
        }

        function startLocalGame() {
            gameState = 'PLAYING';
            arena = createMatrix(12, 20);
            nextPieceMatrix = null;
            player.score = 0;
            attackCharge = 0;
            dropInterval = isTutorial ? 999999 : 1000; 
            
            document.getElementById('score').innerText = 0;
            document.getElementById('charge').innerText = 0;
            
            for(let id in playersData) {
                playersData[id].alive = true;
                playersData[id].board = createMatrix(12, 20);
            }
            
            setupOpponentViews();
            playerReset();
            startMusicAndStream();
            switchScreen('game');
            lastTime = performance.now();
            update();
        }

        function setupOpponentViews() {
            opponentsContainer.innerHTML = '';
            targetId = null;
            document.getElementById('current-target-name').innerText = 'None';

            for (let id in playersData) {
                if (id === myId) continue;
                
                let div = document.createElement('div');
                div.className = 'opponent';
                div.innerHTML = `
                    <div class="opponent-name">${playersData[id].name}</div>
                    <canvas id="canvas-${id}" width="120" height="200"></canvas>
                    <button class="target-btn" id="btn-${id}" onclick="setTarget('${id}')">Target</button>
                `;
                opponentsContainer.appendChild(div);

                let ctx = document.getElementById(`canvas-${id}`).getContext('2d');
                ctx.scale(10, 10);
                playersData[id].ctx = ctx;

                if (!targetId && !isTutorial) setTarget(id); 
            }
        }

        function drawOpponent(id) {
            const opp = playersData[id];
            if (!opp || !opp.ctx) return;
            
            opp.ctx.fillStyle = opp.alive ? '#111' : '#400'; 
            opp.ctx.fillRect(0, 0, 120, 200);
            drawMatrix(opp.board, {x:0, y:0}, opp.ctx, 1);
            
            if (!opp.alive) {
                opp.ctx.fillStyle = 'rgba(255,0,0,0.5)';
                opp.ctx.fillRect(0,0,12,20);
            }
        }

        function setTarget(id) {
            if (isTutorial && tutorialStep === 7 && id === 'dummy') {
                advanceTutorial();
            }

            if(targetId) {
                let oldBtn = document.getElementById(`btn-${targetId}`);
                if(oldBtn) oldBtn.classList.remove('selected');
            }
            targetId = id;
            let newBtn = document.getElementById(`btn-${id}`);
            if(newBtn) newBtn.classList.add('selected');
            document.getElementById('current-target-name').innerText = playersData[id].name;
        }

        function autoSwitchTarget() {
            if (targetId && playersData[targetId] && !playersData[targetId].alive) {
                for(let id in playersData) {
                    if (id !== myId && playersData[id].alive) {
                        setTarget(id);
                        return;
                    }
                }
                document.getElementById('current-target-name').innerText = 'None';
                targetId = null;
            }
        }

        function checkWinCondition() {
            if (!isHost || isSolo || isTutorial) return;
            let alivePlayers = [];
            for (let id in playersData) {
                if (playersData[id].alive) alivePlayers.push(id);
            }
            
            if (alivePlayers.length <= 1) {
                let winnerId = alivePlayers.length === 1 ? alivePlayers[0] : null;
                let winnerName = winnerId ? playersData[winnerId].name : 'No one';
                
                sendNetworkMessage({ type: 'GAME_OVER', winnerId, winnerName });
                showEndScreen(winnerId === myId, winnerName);
            }
        }

        function showEndScreen(isWinner, winnerName) {
            gameState = 'END';
            cancelAnimationFrame(animationId);
            stopMusic();
            
            const title = document.getElementById('end-title');
            const sub = document.getElementById('end-subtitle');
            const continueBtn = document.getElementById('btn-continue');
            
            if (isSolo) {
                title.innerText = "GAME OVER";
                title.style.color = "#FF0D72";
                sub.innerText = `Final Score: ${player.score}`;
                continueBtn.style.display = 'inline-block';
            } else if (isTutorial) {
                // Tutorial doesn't use standard end screen, but just in case
                leaveRoom();
                return;
            } else {
                if (isWinner) {
                    title.innerText = "VICTORY!";
                    title.style.color = "#0DFF72";
                    sub.innerText = "You are the last player standing.";
                    myTrophies += 1;
                    localStorage.setItem('tetrisTrophies', myTrophies);
                    document.getElementById('menu-trophies').innerText = myTrophies;
                } else {
                    title.innerText = "DEFEAT";
                    title.style.color = "#FF0D72";
                    sub.innerText = winnerName ? `${winnerName} won the match.` : "You have been eliminated.";
                }
                if (isHost) continueBtn.style.display = 'inline-block';
            }
            
            switchScreen('end');
        }

        function continueToLobby() {
            if (!isHost) return;
            sendNetworkMessage({ type: 'CONTINUE' });
            gameState = 'LOBBY';
            switchScreen('lobby');
        }

        function leaveRoom() {
            if (peer) peer.destroy();
            peer = null;
            connections = {};
            hostConn = null;
            playersData = {};
            stopMusic();
            document.getElementById('btn-create').disabled = false;
            document.getElementById('btn-join').disabled = false;
            statusTxt.innerText = "";
            document.getElementById('tutorial-box').style.display = 'none';
            switchScreen('menu');
            gameState = 'MENU';
        }

        // --- MUSIC LGOIC ---
        function startMusicAndStream() {
            stopMusic();
            
            if (isHost || isSolo) {
                const fileInput = document.getElementById('audio-file');
                if (fileInput.files.length > 0) {
                    const url = URL.createObjectURL(fileInput.files[0]);
                    customAudio = new Audio(url);
                    customAudio.loop = true;
                    customAudio.volume = 0.5;
                    
                    customAudio.play().then(() => {
                        // Only stream if in a peer multiplayer room
                        if (peer && !isSolo) {
                            const captureFunc = customAudio.captureStream || customAudio.mozCaptureStream;
                            if (captureFunc) {
                                myAudioStream = captureFunc.call(customAudio);
                                for (let id in connections) {
                                    peer.call(id, myAudioStream);
                                }
                            }
                        }
                    }).catch(e => console.log("Audio play blocked", e));
                }
            }
        }

        function stopMusic() {
            if (customAudio) {
                customAudio.pause();
                customAudio.currentTime = 0;
            }
            if (remoteAudioNode) {
                remoteAudioNode.pause();
                remoteAudioNode.srcObject = null;
            }
        }

        // Keyboard inputs
        document.addEventListener('keydown', event => {
            if(gameState !== 'PLAYING') return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerHardDrop();
            else if (event.keyCode === 81) playerRotate(-1);
            else if (event.keyCode === 87 || event.keyCode === 38) playerRotate(1);
        });

    </script>
</body>
</html>

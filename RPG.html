<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Dodge Mobile</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Interfaz de Combate */
        #battle-screen { width: 90vw; max-width: 400px; text-align: center; }
        #enemy { font-size: 50px; margin-bottom: 20px; transition: 0.2s; }
        #stats { margin: 10px 0; font-size: 18px; }
        
        /* Caja de Esquive */
        #dodge-box { 
            width: 300px; height: 200px; border: 4px solid white; 
            position: relative; margin: 20px auto; display: none; 
            background: black; overflow: hidden;
        }
        #player-soul { 
            width: 20px; height: 20px; background: #00eaff; 
            position: absolute; border-radius: 2px;
        }
        .bullet { 
            width: 10px; height: 10px; background: red; 
            position: absolute; border-radius: 50%; 
        }

        /* Botones */
        button {
            padding: 15px 30px; font-size: 20px; background: transparent;
            color: white; border: 2px solid white; cursor: pointer;
        }
        button:active { background: white; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="battle-screen">
        <div id="enemy">👹</div>
        <div id="stats">HP Enemigo: <span id="e-hp">100</span> | Tu HP: <span id="p-hp">20</span></div>
        
        <div id="dialogue">¡Un monstruo aparece!</div>
        
        <div id="dodge-box">
            <div id="player-soul"></div>
        </div>

        <div id="controls">
            <button onclick="playerAttack()">ATACAR</button>
        </div>
    </div>
</div>

<script>
    // Configuración inicial
    let playerHp = 20;
    let enemyHp = 100;
    let isDodgePhase = false;
    const dodgeBox = document.getElementById('dodge-box');
    const soul = document.getElementById('player-soul');
    const eHpDisplay = document.getElementById('e-hp');
    const pHpDisplay = document.getElementById('p-hp');
    
    let soulPos = { x: 140, y: 90 };
    let bullets = [];

    // --- LÓGICA DE ATAQUE ---
    function playerAttack() {
        let damage = 15 + Math.floor(Math.random() * 10);
        enemyHp -= damage;
        eHpDisplay.innerText = enemyHp;
        document.getElementById('dialogue').innerText = `¡Le diste! -${damage} HP`;
        
        document.getElementById('controls').classList.add('hidden');
        
        setTimeout(() => {
            if (enemyHp <= 0) {
                document.getElementById('dialogue').innerText = "¡GANASTE!";
                return;
            }
            startEnemyTurn();
        }, 1000);
    }

    // --- LÓGICA DE DEFENSA (ESQUIVE) ---
    function startEnemyTurn() {
        document.getElementById('dialogue').innerText = "¡Esquiva!";
        dodgeBox.style.display = 'block';
        isDodgePhase = true;
        spawnBullets();
        playBip(200, 0.1); // Sonido de inicio de turno

        setTimeout(endEnemyTurn, 5000); // El turno dura 5 segundos
    }

    function endEnemyTurn() {
        isDodgePhase = false;
        dodgeBox.style.display = 'none';
        bullets.forEach(b => b.el.remove());
        bullets = [];
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('dialogue').innerText = "Tu turno...";
    }

    // Control táctil para móvil
    document.addEventListener('touchmove', (e) => {
        if (!isDodgePhase) return;
        const touch = e.touches[0];
        const rect = dodgeBox.getBoundingClientRect();
        
        soulPos.x = touch.clientX - rect.left - 10;
        soulPos.y = touch.clientY - rect.top - 10;

        // Limites
        soulPos.x = Math.max(0, Math.min(280, soulPos.x));
        soulPos.y = Math.max(0, Math.min(180, soulPos.y));

        soul.style.left = soulPos.x + 'px';
        soul.style.top = soulPos.y + 'px';
    });

    function spawnBullets() {
        if (!isDodgePhase) return;
        
        const bEl = document.createElement('div');
        bEl.className = 'bullet';
        dodgeBox.appendChild(bEl);
        
        let bData = {
            el: bEl,
            x: Math.random() * 280,
            y: -10,
            speed: 2 + Math.random() * 3
        };
        bullets.push(bData);

        if (isDodgePhase) setTimeout(spawnBullets, 400);
    }

    function updateGame() {
        if (isDodgePhase) {
            bullets.forEach((b, index) => {
                b.y += b.speed;
                b.el.style.top = b.y + 'px';
                b.el.style.left = b.x + 'px';

                // Colisión básica
                if (Math.abs(b.x - soulPos.x) < 15 && Math.abs(b.y - soulPos.y) < 15) {
                    playerHp -= 1;
                    pHpDisplay.innerText = playerHp;
                    playBip(100, 0.05); // Sonido de daño
                    if (playerHp <= 0) location.reload();
                }
            });
        }
        requestAnimationFrame(updateGame);
    }

    // --- MÚSICA Y SONIDO (Sintetizador) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBip(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    updateGame();
</script>
</body>
</html>

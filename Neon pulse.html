<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pulse - Mobile Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        #score { font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }
        #msg { font-size: 1rem; opacity: 0.7; }
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .btn {
            padding: 15px 30px;
            background: #00f2ff;
            color: black;
            border: none;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>NEON PULSE</h1>
        <p>Toca al ritmo para capturar la energía</p>
        <button class="btn" onclick="startGame()">EMPEZAR</button>
    </div>

    <div id="ui">
        <div id="score">0</div>
        <div id="msg">¡TOCA!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/**
 * LÓGICA DEL JUEGO "NEON PULSE"
 * Un juego donde generas ondas de sonido para capturar orbes.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('startScreen');

let score = 0;
let circles = [];
let particles = [];
let pulse = { x: 0, y: 0, r: 0, active: false };
let gameActive = false;

// Web Audio API para música procedural
let audioCtx;
function playNote(freq, type, duration) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function spawnCircle() {
    if(!gameActive) return;
    circles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 0,
        maxR: 30 + Math.random() * 20,
        alive: true
    });
    setTimeout(spawnCircle, 800 - Math.min(score * 5, 400));
}

function startGame() {
    startScreen.style.display = 'none';
    score = 0;
    scoreEl.innerText = score;
    circles = [];
    gameActive = true;
    spawnCircle();
    update();
}

window.addEventListener('touchstart', (e) => {
    if(!gameActive) return;
    const touch = e.touches[0];
    pulse.x = touch.clientX;
    pulse.y = touch.clientY;
    pulse.r = 0;
    pulse.active = true;
    
    // Música: Nota baja de fondo al tocar
    playNote(110 + (Math.random() * 50), 'sine', 0.5);
});

function update() {
    if(!gameActive) return;
    ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar Pulso del jugador
    if(pulse.active) {
        pulse.r += 10;
        ctx.beginPath();
        ctx.arc(pulse.x, pulse.y, pulse.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - pulse.r/300})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        if(pulse.r > 250) pulse.active = false;
    }

    // Dibujar Orbes
    circles.forEach((c, index) => {
        if(c.r < c.maxR) c.r += 0.5;
        
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ff0077';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff0077';
        ctx.fill();

        // Colisión con el pulso
        if(pulse.active) {
            const dx = pulse.x - c.x;
            const dy = pulse.y - c.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(Math.abs(dist - pulse.r) < 10) {
                circles.splice(index, 1);
                score++;
                scoreEl.innerText = score;
                playNote(440 + (score * 10), 'triangle', 0.2); // Nota melódica
            }
        }

        // Si el orbe crece demasiado, pierdes
        if(c.r >= c.maxR) {
            gameOver();
        }
    });

    requestAnimationFrame(update);
}

function gameOver() {
    gameActive = false;
    alert("FIN DEL JUEGO. Puntuación: " + score);
    location.reload();
}
</script>
</body>
</html>

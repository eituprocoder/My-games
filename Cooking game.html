<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Master 2D</title>
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #f1c40f;
            --dark: #2c3e50;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
            user-select: none;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(#87CEEB 60%, #95a5a6 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        #stats {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 0 0 20px 20px;
            width: 80%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        #kitchen {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #pan {
            width: 180px;
            height: 180px;
            background: #34495e;
            border-radius: 50%;
            border: 8px solid #2c3e50;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 0 #1a252f;
        }
        #pan:active {
            transform: scale(0.95) translateY(5px);
            box-shadow: 0 5px 0 #1a252f;
        }
        .burger {
            font-size: 60px;
        }
        #shop {
            width: 100%;
            background: white;
            padding: 15px;
            border-top: 5px solid var(--primary);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            box-sizing: border-box;
        }
        .item {
            background: #eee;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }
        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            margin-top: 5px;
            font-weight: bold;
        }
        button:disabled { background: #bdc3c7; }
        
        /* Animación de +1 */
        .particle {
            position: absolute;
            color: #e67e22;
            font-weight: bold;
            animation: floatUp 0.8s forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            to { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">
        🍔 Hamburguesas: <span id="score">0</span><br>
        <small>Por segundo: <span id="gps">0</span></small>
    </div>

    <div id="kitchen">
        <div id="pan" onclick="cook()">
            <span class="burger">🍔</span>
        </div>
    </div>

    <div id="shop">
        <div class="item">
            👨‍🍳 Ayudante<br>
            Coste: <span id="cost1">15</span>
            <button onclick="buy(1)">Comprar</button>
        </div>
        <div class="item">
            🔥 Parrilla Pro<br>
            Coste: <span id="cost2">100</span>
            <button onclick="buy(2)">Comprar</button>
        </div>
        <button onclick="toggleMusic()" style="grid-column: span 2; background: var(--dark);">🎵 Activar Música</button>
    </div>
</div>

<script>
    let score = 0;
    let gps = 0;
    let clickValue = 1;
    let costs = [15, 100];
    let musicPlaying = false;
    let audioCtx = null;

    function cook() {
        score += clickValue;
        createParticle();
        updateDisplay();
    }

    function buy(item) {
        let idx = item - 1;
        if (score >= costs[idx]) {
            score -= costs[idx];
            if(item === 1) gps += 1;
            if(item === 2) clickValue += 5;
            costs[idx] = Math.floor(costs[idx] * 1.5);
            updateDisplay();
        }
    }

    function updateDisplay() {
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('gps').innerText = gps;
        document.getElementById('cost1').innerText = costs[0];
        document.getElementById('cost2').innerText = costs[1];
    }

    function createParticle() {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = '+' + clickValue;
        p.style.left = '50%';
        p.style.top = '40%';
        document.getElementById('kitchen').appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    // Lógica de Juego (Ingresos pasivos)
    setInterval(() => {
        if (gps > 0) {
            score += gps / 10;
            updateDisplay();
        }
    }, 100);

    // MÚSICA (Generada por código para no depender de archivos externos)
    function toggleMusic() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        musicPlaying = !musicPlaying;
        if (musicPlaying) playMelody();
    }

    function playNote(freq, start, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration);
    }

    function playMelody() {
        if (!musicPlaying) return;
        let now = audioCtx.currentTime;
        const notes = [261, 329, 392, 523, 392, 329]; // C-E-G-C-G-E
        notes.forEach((f, i) => playNote(f, now + i * 0.4, 0.3));
        setTimeout(playMelody, 2400);
    }
</script>

</body>
</html>

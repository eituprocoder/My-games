<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Wardens - Strategy Engine</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0b1e;
            --panel-bg: #161b33;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.2));
        }

        /* --- MENÚ DE NIVELES --- */
        #level-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 11, 30, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .level-btn {
            width: 80px;
            height: 80px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            color: white;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .level-btn:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        .level-btn.active:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- TABLERO --- */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background: #1e2445;
            border: 3px solid var(--neon-purple);
            padding: 5px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            position: relative;
        }

        .cell.path { background: rgba(0, 243, 255, 0.05); }

        /* --- BLOQUES --- */
        #toolbox {
            width: 200px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--neon-blue);
        }

        .block {
            padding: 10px;
            margin-bottom: 10px;
            background: #2a2f4d;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .block:hover { border-color: var(--neon-blue); background: #353b5e; }
        .block-move { border-left: 5px solid #4CAF50; }
        .block-turn { border-left: 5px solid #FFC107; }
        .block-attack { border-left: 5px solid #F44336; }

        /* --- ESPACIO DE TRABAJO --- */
        #workspace {
            width: 250px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--neon-purple);
        }

        #program-list {
            flex-grow: 1;
            min-height: 300px;
            border: 1px dashed #444;
            margin-bottom: 10px;
            overflow-y: auto;
        }

        .queued-block {
            padding: 8px;
            margin: 5px;
            background: #353b5e;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .btn-run {
            background: var(--neon-purple);
            border: none;
            color: white;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-run:hover { background: #9d11d6; }

        #status-msg {
            margin-top: 10px;
            height: 20px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .robot { transition: transform 0.3s, left 0.3s, top 0.3s; z-index: 10; }
        
        h1 { margin-top: 10px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

    </style>
</head>
<body>

    <h1>GALAXY WARDENS</h1>

    <div id="status-msg">Selecciona un nivel para comenzar</div>

    <div id="game-container">
        <div id="toolbox">
            <h3>BLOQUES</h3>
            <div class="block block-move" onclick="addBlock('MOVE')">↑ Mover Adelante</div>
            <div class="block block-turn" onclick="addBlock('TURN_R')">↷ Girar Derecha</div>
            <div class="block block-turn" onclick="addBlock('TURN_L')">↶ Girar Izquierda</div>
            <div class="block block-attack" onclick="addBlock('ATTACK')">⚡ Atacar</div>
            <button onclick="clearProgram()" style="width:100%; margin-top:20px; background:#444; color:white; border:none; padding:5px; cursor:pointer;">Borrar Todo</button>
        </div>

        <div id="board"></div>

        <div id="workspace">
            <h3>ESTRATEGIA</h3>
            <div id="program-list"></div>
            <button class="btn-run" onclick="executeProgram()">EJECUTAR ESTRATEGIA</button>
        </div>
    </div>

    <div id="level-menu">
        <h2>CENTRO DE MANDO</h2>
        <p>Desbloquea los sectores de la galaxia</p>
        <div class="level-grid" id="level-buttons"></div>
    </div>

    <script>
        const BOARD_SIZE = 8;
        let currentLevel = 0;
        let unlockedLevels = 1;
        let robotPos = { x: 0, y: 0, dir: 0 }; // 0:E, 1:S, 2:W, 3:N
        let program = [];
        let isExecuting = false;

        const levels = [
            {
                start: {x: 0, y: 7, dir: 3},
                flag: {x: 0, y: 0},
                enemies: [],
                walls: []
            },
            {
                start: {x: 0, y: 7, dir: 0},
                flag: {x: 7, y: 0},
                enemies: [{x: 4, y: 4}],
                walls: [{x: 3, y: 0}, {x: 3, y: 1}, {x: 3, y: 2}]
            },
            {
                start: {x: 0, y: 4, dir: 0},
                flag: {x: 7, y: 4},
                enemies: [{x: 3, y: 4}, {x: 5, y: 4}],
                walls: []
            }
        ];

        // Inicializar Menú
        function initMenu() {
            const container = document.getElementById('level-buttons');
            container.innerHTML = '';
            for(let i=0; i < levels.length; i++) {
                const btn = document.createElement('button');
                btn.className = `level-btn ${i < unlockedLevels ? 'active' : ''}`;
                btn.innerText = i + 1;
                btn.disabled = i >= unlockedLevels;
                btn.onclick = () => startLevel(i);
                container.appendChild(btn);
            }
        }

        // Cargar Nivel
        function startLevel(idx) {
            currentLevel = idx;
            const lvl = levels[idx];
            robotPos = { ...lvl.start };
            program = [];
            updateWorkspace();
            renderBoard();
            document.getElementById('level-menu').style.display = 'none';
            document.getElementById('status-msg').innerText = `Nivel ${idx + 1}: ¡Llega a la bandera!`;
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const lvl = levels[currentLevel];

            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (x === lvl.flag.x && y === lvl.flag.y) cell.innerText = '🚩';
                    
                    lvl.enemies.forEach(en => {
                        if(en.x === x && en.y === y) cell.innerText = '👻';
                    });

                    lvl.walls.forEach(w => {
                        if(w.x === x && w.y === y) cell.style.background = '#333';
                    });

                    if (x === robotPos.x && y === robotPos.y) {
                        const rb = document.createElement('div');
                        rb.className = 'robot';
                        rb.innerText = '🤖';
                        rb.style.transform = `rotate(${robotPos.dir * 90}deg)`;
                        cell.appendChild(rb);
                    }

                    board.appendChild(cell);
                }
            }
        }

        function addBlock(type) {
            if(isExecuting) return;
            program.push(type);
            updateWorkspace();
        }

        function clearProgram() {
            if(isExecuting) return;
            program = [];
            updateWorkspace();
        }

        function updateWorkspace() {
            const list = document.getElementById('program-list');
            list.innerHTML = '';
            program.forEach((step, index) => {
                const item = document.createElement('div');
                item.className = 'queued-block';
                let text = "";
                switch(step) {
                    case 'MOVE': text = "Mover Adelante"; break;
                    case 'TURN_R': text = "Girar Derecha"; break;
                    case 'TURN_L': text = "Girar Izquierda"; break;
                    case 'ATTACK': text = "Atacar ⚡"; break;
                }
                item.innerHTML = `<span>${index + 1}. ${text}</span>`;
                list.appendChild(item);
            });
        }

        async function executeProgram() {
            if(isExecuting || program.length === 0) return;
            isExecuting = true;
            
            const lvl = levels[currentLevel];
            let tempRobot = { ...lvl.start };
            robotPos = { ...tempRobot };

            for (let step of program) {
                await new Promise(r => setTimeout(r, 600));
                
                if (step === 'MOVE') {
                    let nextX = robotPos.x;
                    let nextY = robotPos.y;
                    if (robotPos.dir === 0) nextX++;
                    else if (robotPos.dir === 1) nextY++;
                    else if (robotPos.dir === 2) nextX--;
                    else if (robotPos.dir === 3) nextY--;

                    // Colisiones
                    const hitWall = lvl.walls.some(w => w.x === nextX && w.y === nextY);
                    const hitEnemy = lvl.enemies.some(e => e.x === nextX && e.y === nextY);

                    if (nextX >= 0 && nextX < BOARD_SIZE && nextY >= 0 && nextY < BOARD_SIZE && !hitWall && !hitEnemy) {
                        robotPos.x = nextX;
                        robotPos.y = nextY;
                    } else if (hitEnemy) {
                        document.getElementById('status-msg').innerText = "¡Destruido por un espíritu!";
                        endRun(false); return;
                    }
                } 
                else if (step === 'TURN_R') {
                    robotPos.dir = (robotPos.dir + 1) % 4;
                } 
                else if (step === 'TURN_L') {
                    robotPos.dir = (robotPos.dir + 3) % 4;
                }
                else if (step === 'ATTACK') {
                    // Ataca a la casilla de enfrente
                    let targetX = robotPos.x;
                    let targetY = robotPos.y;
                    if (robotPos.dir === 0) targetX++;
                    else if (robotPos.dir === 1) targetY++;
                    else if (robotPos.dir === 2) targetX--;
                    else if (robotPos.dir === 3) targetY--;

                    const enemyIdx = lvl.enemies.findIndex(e => e.x === targetX && e.y === targetY);
                    if(enemyIdx !== -1) {
                        lvl.enemies.splice(enemyIdx, 1);
                        document.getElementById('status-msg').innerText = "¡Espíritu purificado!";
                    }
                }

                renderBoard();

                // Victoria
                if (robotPos.x === lvl.flag.x && robotPos.y === lvl.flag.y) {
                    document.getElementById('status-msg').innerText = "¡OBJETIVO LOGRADO!";
                    await new Promise(r => setTimeout(r, 1000));
                    endRun(true);
                    return;
                }
            }

            if (robotPos.x !== lvl.flag.x || robotPos.y !== lvl.flag.y) {
                document.getElementById('status-msg').innerText = "Secuencia terminada. Inténtalo de nuevo.";
                endRun(false);
            }
        }

        function endRun(win) {
            isExecuting = false;
            if (win) {
                if (currentLevel + 1 === unlockedLevels && unlockedLevels < levels.length) {
                    unlockedLevels++;
                }
                document.getElementById('level-menu').style.display = 'flex';
                initMenu();
            } else {
                // Reset posición pero mantener programa
                robotPos = { ...levels[currentLevel].start };
                renderBoard();
            }
        }

        // Iniciar
        initMenu();

    </script>
</body>
</html>
